<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Crypto Landing Page</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css"/>

  <!-- FONT AWESOME -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>

<body>

  <!-- NAVBAR -->
  <header>

    <div class="logo">
      <i class="fa-solid fa-gem"></i>
    </div>

    <nav>
      <a href="#" class="active">Home</a>
      <a href="#">Services</a>
      <a href="#">Product</a>
      <a href="#">Contact</a>
    </nav>

    <button class="signup">Sign Up</button>

  </header>

  <!-- HERO SECTION -->
  <section class="hero">

    <!-- LEFT -->
    <div class="left">

        <h1>
            Our basic thesis for bitcoin is that it is better than gold.
          </h1>

      <p>
        Contrary to popular belief, Lorem Ipsum is not simply random text.
        It has roots in classical Latin literature from 45 BC.
      </p>

      <div class="buttons">

        <button class="play">
          <i class="fa-solid fa-play"></i>
        </button>

        <span class="learn">LEARN MORE</span>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <img src="back-image.png" alt="crypto">

    </div>

  </section>

  <!-- BOTTOM BOX -->
  <div class="bottom-box">

    <div class="box">
      <i class="fa-solid fa-share-nodes"></i>
      <p>SHARE TO</p>
    </div>

    <div class="box">
      <i class="fa-solid fa-signal"></i>
      <p>RECENT NEWS</p>
    </div>

    <div class="box">
      <i class="fa-solid fa-chart-simple"></i>
      <p>ANALYTICS</p>
    </div>

    <div class="box">
      <i class="fa-brands fa-bitcoin"></i>
      <p>WALLET</p>
    </div>

  </div>

  <!-- BACKGROUND IMAGE -->
 

  <!-- SOCIAL -->
  <div class="social">

    <i class="fa-brands fa-facebook-f"></i>
    <i class="fa-brands fa-twitter"></i>
    <i class="fa-brands fa-linkedin-in"></i>
    <i class="fa-brands fa-instagram"></i>

  </div>

</body>
</html>
